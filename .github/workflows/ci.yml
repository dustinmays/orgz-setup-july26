name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t orgz-hello .

      - name: Run image and check output
        run: docker run --rm orgz-hello | tee /tmp/output.txt

      - name: Fail if hello.txt is empty
        run: test -s /tmp/output.txt
